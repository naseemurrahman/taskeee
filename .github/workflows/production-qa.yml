name: Production QA Smoke

on:
  workflow_dispatch:
    inputs:
      prod_url:
        description: Production URL to smoke test
        required: false
        default: https://taskeee-ashen.vercel.app
  schedule:
    - cron: '0 7 * * 1'

jobs:
  production-smoke:
    name: Production route and asset smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run production QA smoke
        env:
          PROD_URL: ${{ github.event.inputs.prod_url || 'https://taskeee-ashen.vercel.app' }}
        run: npm run qa:production
