name: Production QA Smoke

on:
  workflow_dispatch:
    inputs:
      prod_url:
        description: Frontend production URL to smoke test
        required: false
        default: https://taskeee-ashen.vercel.app
      api_url:
        description: Backend production API URL to smoke test
        required: false
        default: ''
  schedule:
    - cron: '0 7 * * 1'

jobs:
  frontend-production-smoke:
    name: Frontend route and asset smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend production QA smoke
        env:
          PROD_URL: ${{ github.event.inputs.prod_url || 'https://taskeee-ashen.vercel.app' }}
        run: npm run qa:production

  backend-production-smoke:
    name: Backend API smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run backend production API smoke
        env:
          API_URL: ${{ github.event.inputs.api_url || secrets.PRODUCTION_API_URL || '' }}
        run: npm run qa:production
