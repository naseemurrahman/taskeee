name: Deploy TASKEE to AWS

# This workflow targets an AWS (EC2 + S3 + CloudFront) deployment.
# The app currently runs on Railway (backend) and Vercel (frontend).
# Disabled auto-triggers to prevent failing checks until AWS is provisioned.
# Enable by adding back push/pull_request triggers once EC2_HOST,
# EC2_SSH_PRIVATE_KEY, and S3/CloudFront secrets are configured.
on:
  workflow_dispatch:   # Manual trigger only

# Cancel in-progress runs when a new push comes in
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Deploy Backend to EC2 via SSH
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}           # Elastic IP from Terraform output
          username: taskee
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }} # Content of your ~/.ssh/id_rsa
          script: |
            set -euo pipefail
            cd /opt/taskee

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Installing dependencies ──"
            cd backend
            npm ci --production

            echo "── Refreshing secrets from AWS Secrets Manager ──"
            aws secretsmanager get-secret-value \
              --secret-id "${{ secrets.SECRET_ARN }}" \
              --region ${{ env.AWS_REGION }} \
              --query 'SecretString' \
              --output text | jq -r 'to_entries[] | "\(.key)=\(.value)"' > /etc/taskee.env
            echo "NODE_ENV=production" >> /etc/taskee.env
            echo "PORT=3001" >> /etc/taskee.env

            echo "── Running database migrations ──"
            set -a; source /etc/taskee.env; set +a
            node src/utils/migrate.js

            echo "── Reloading PM2 (zero-downtime) ──"
            cd /opt/taskee
            pm2 reload ecosystem.config.js --update-env

            echo "── Health check ──"
            sleep 3
            curl -sf http://localhost:3001/health || (pm2 logs taskee-api --lines 20 && exit 1)

            echo "✅ Backend deployed successfully"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Frontend and Deploy to S3 + Invalidate CloudFront
  # ─────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://api.${{ secrets.DOMAIN_NAME }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        working-directory: frontend
        run: |
          # Upload hashed assets with long cache (1 year)
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # Upload index.html with no-cache so new deploys are picked up immediately
          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Verify deployment
        run: |
          sleep 15
          STATUS=$(curl -so /dev/null -w "%{http_code}" https://${{ secrets.DOMAIN_NAME }})
          echo "HTTP status: $STATUS"
          [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || exit 1

      - name: Post deployment summary
        run: |
          echo "## ✅ TASKEE Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://${{ secrets.DOMAIN_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://api.${{ secrets.DOMAIN_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY
