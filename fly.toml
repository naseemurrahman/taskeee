app = 'taskflow-pro'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "cd backend && node scripts/migrate.js"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.checks]]
    path = "/"
    interval = "10s"
    timeout = "2s"
